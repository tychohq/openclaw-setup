id: session-config
description: "Session scope, reset policy (1yr idle), thread bindings, message queue steering"
targets: ["*"]
created: 2026-03-01T22:02:00Z

steps:
  - type: config_set
    path: session.dmScope
    value: "per-channel-peer"

  - type: config_set
    path: session.reset
    value: '{"mode":"idle","idleMinutes":525600}'

  - type: config_set
    path: session.threadBindings
    value: '{"enabled":true,"idleHours":24}'

  - type: config_set
    path: messages.queue.mode
    value: "steer"
