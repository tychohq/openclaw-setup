id: audio-transcription
description: "Voice message transcription via OpenAI Whisper API"
targets: ["*"]
created: 2026-03-01T22:03:01Z

requires:
  - OPENAI_API_KEY

steps:
  - type: config_set
    path: tools.media.audio.enabled
    value: "true"

  - type: config_append
    path: tools.media.audio.models
    value: '[{"type":"provider","provider":"openai","model":"whisper-1"}]'
