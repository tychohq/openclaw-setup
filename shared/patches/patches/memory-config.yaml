id: memory-config
description: "Builtin memory backend (.md indexing), session memory hooks, OpenAI embeddings"
targets: ["*"]
created: 2026-03-01T22:01:00Z

requires:
  - OPENAI_API_KEY

steps:
  - type: config_set
    path: agents.defaults.memorySearch
    value: '{"sources":["memory","sessions"],"extraPaths":["."],"experimental":{"sessionMemory":true},"provider":"openai","remote":{"batch":{"enabled":true}},"fallback":"none","sync":{"sessions":{"deltaBytes":1,"deltaMessages":1}}}'

  - type: config_set
    path: memory.backend
    value: "builtin"

  - type: config_set
    path: hooks.internal.enabled
    value: "true"

  - type: config_set
    path: hooks.internal.entries.session-memory.enabled
    value: "true"
