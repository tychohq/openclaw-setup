id: discord-channel
description: "Discord plugin + channel settings (DM + group allowlist, no streaming, thread bindings)"
targets: ["*"]
created: 2026-03-01T22:05:00Z

requires:
  - DISCORD_TOKEN
  - DISCORD_OWNER_ID
  - DISCORD_GUILD_ID

steps:
  - type: plugin_enable
    plugin: discord

  - type: config_set
    path: channels.discord.allowFrom
    value: '["$DISCORD_OWNER_ID"]'

  - type: config_set
    path: channels.discord.guilds.$DISCORD_GUILD_ID.requireMention
    value: "false"

  - type: config_set
    path: channels.discord.guilds.$DISCORD_GUILD_ID.users
    value: '["$DISCORD_OWNER_ID"]'

  - type: config_set
    path: channels.discord.enabled
    value: "true"

  - type: config_set
    path: channels.discord.groupPolicy
    value: "allowlist"

  - type: config_set
    path: channels.discord.streaming
    value: "off"

  - type: config_set
    path: channels.discord.dmPolicy
    value: "allowlist"

  - type: config_set
    path: channels.discord.threadBindings
    value: '{"enabled":true,"spawnAcpSessions":true}'
