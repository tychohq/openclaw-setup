id: model-providers
description: "Anthropic model provider (Opus 4.6, Sonnet 4.6) and model aliases"
targets: ["*"]
created: 2026-03-01T22:04:00Z

requires:
  - ANTHROPIC_API_KEY

steps:
  - type: config_set
    path: models.mode
    value: "merge"

  - type: config_set
    path: models.providers.anthropic
    value: '{"baseUrl":"https://api.anthropic.com","api":"anthropic-messages","models":[{"id":"claude-opus-4-6","name":"Claude Opus 4.6","reasoning":false,"input":["text","image"],"cost":{"input":15,"output":75,"cacheRead":1.5,"cacheWrite":18.75},"contextWindow":200000,"maxTokens":8192},{"id":"claude-sonnet-4-6","name":"Claude Sonnet 4.6","reasoning":false,"input":["text","image"],"cost":{"input":3,"output":15,"cacheRead":0.3,"cacheWrite":3.75},"contextWindow":200000,"maxTokens":8192}]}'

  - type: config_set
    path: agents.defaults.models
    value: '{"anthropic/claude-opus-4-6":{"alias":"opus"},"anthropic/claude-sonnet-4-6":{"alias":"sonnet"}}'
