id: signal-channel
description: "Signal channel settings (DM + group allowlist)"
targets: ["*"]
created: 2026-03-01T22:07:00Z

requires:
  - SIGNAL_PHONE_NUMBER

steps:
  - type: plugin_enable
    plugin: signal

  - type: config_set
    path: channels.signal.allowFrom
    value: '["$SIGNAL_PHONE_NUMBER"]'

  - type: config_set
    path: channels.signal.enabled
    value: "true"

  - type: config_set
    path: channels.signal.dmPolicy
    value: "allowlist"

  - type: config_set
    path: channels.signal.groupPolicy
    value: "allowlist"
