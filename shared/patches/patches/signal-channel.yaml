id: signal-channel
description: "Signal channel settings (allowlist, DM pairing). Requires signal-cli and account phone number."
targets: ["*"]
created: 2026-03-01T22:07:00Z

steps:
  - type: config_patch
    merge_file: configs/signal-channel.json

  - type: exec
    command: jq '.plugins.allow=((.plugins.allow//[])+["signal"]|unique)' $HOME/.openclaw/openclaw.json > /tmp/_oc_patch.json && mv /tmp/_oc_patch.json $HOME/.openclaw/openclaw.json
