id: browser-config
description: "Auto-detect headful/headless browser mode based on display availability"
targets: ["*"]
created: 2026-03-01T22:10:00Z

steps:
  - type: exec
    command: "if [ -n \"${DISPLAY:-}\" ] || [ \"$(uname)\" = Darwin ]; then openclaw config set browser.headless false; else openclaw config set browser.headless true; fi"
