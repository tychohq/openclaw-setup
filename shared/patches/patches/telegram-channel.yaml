id: telegram-channel
description: "Telegram plugin + channel settings (allowlist, no streaming, DM allowlist)"
targets: ["*"]
created: 2026-03-01T22:06:00Z

requires:
  - TELEGRAM_BOT_TOKEN
  - TELEGRAM_OWNER_ID

steps:
  - type: plugin_enable
    plugin: telegram

  - type: config_set
    path: channels.telegram.allowFrom
    value: '["$TELEGRAM_OWNER_ID"]'

  - type: config_patch
    merge_file: configs/telegram-channel.json
