id: slack-channel
description: "Slack plugin + channel settings (stub — not yet in production). Requires SLACK_BOT_TOKEN."
targets: ["*"]
created: 2026-03-01T22:08:00Z

steps:
  - type: config_patch
    merge_file: configs/slack-channel.json

  - type: exec
    command: jq '.plugins.allow=((.plugins.allow//[])+["slack"]|unique)' $HOME/.openclaw/openclaw.json > /tmp/_oc_patch.json && mv /tmp/_oc_patch.json $HOME/.openclaw/openclaw.json
