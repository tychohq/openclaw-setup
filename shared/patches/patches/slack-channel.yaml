id: slack-channel
description: "Slack plugin + channel settings (DM + group allowlist, no streaming)"
targets: ["*"]
created: 2026-03-01T22:08:00Z

requires:
  - SLACK_BOT_TOKEN
  - SLACK_APP_TOKEN
  - SLACK_OWNER_USER_ID

steps:
  - type: plugin_enable
    plugin: slack

  - type: config_patch
    merge_file: configs/slack-channel.json
