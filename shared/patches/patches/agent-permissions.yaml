id: agent-permissions
description: "Unrestricted shell, full filesystem access, no confirmation prompts, sudo allowed"
targets: ["*"]
created: 2026-03-01T22:03:02Z

steps:
  - type: config_set
    path: tools.exec.security
    value: "full"

  - type: config_set
    path: tools.exec.ask
    value: "off"

  - type: config_set
    path: tools.fs.workspaceOnly
    value: "false"

  - type: config_set
    path: tools.elevated.enabled
    value: "true"
